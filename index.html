<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INPASA Parada SINOP</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --surface: #1e293b;
      --primary: #3b82f6;
      --secondary: #10b981;
      --accent: #f59e0b;
      --danger: #ef4444;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --border-radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15) 0%, transparent 50%);
      background-attachment: fixed;
    }

    header {
      padding: 2rem 5%;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    .logo-area {
      text-align: center;
      justify-self: center;
    }

    .logo-area h1 {
      font-size: 2.2rem;
      color: #76a6ff;
      letter-spacing: -1px;
    }

    .logo-area p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .header-right {
      justify-self: end;
    }

    .brand-logo {
      max-height: 72px;
      width: auto;
      background: rgba(255,255,255,0.96);
      padding: 8px 14px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.20);
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
      padding: 2rem 5%;
    }

    .stat-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      padding: 1.25rem;
    }

    .stat-title {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
    }

    .main-content {
      flex: 1;
      padding: 0 5% 3rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .search-bar { flex: 1; min-width: 280px; }

    .search-input,
    .filter-select {
      width: 100%;
      padding: 1rem 1.25rem;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: rgba(30, 41, 59, 0.8);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .filter-select { width: auto; cursor: pointer; }

    .save-bar {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .save-btn, .load-btn {
      padding: 0.9rem 1.3rem;
      border-radius: 12px;
      border: 1px solid rgba(59, 130, 246, 0.35);
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .save-btn {
      background: linear-gradient(135deg, rgba(59,130,246,0.95), rgba(37,99,235,0.95));
    }

    .load-btn {
      background: rgba(30, 41, 59, 0.9);
    }

    .save-info {
      margin-bottom: 1rem;
      text-align: right;
      color: var(--text-muted);
      font-size: 0.92rem;
      min-height: 1.2rem;
    }

    .table-container {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      min-width: 1100px;
    }

    th {
      background: rgba(15, 23, 42, 0.95);
      padding: 1rem 1.25rem;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);
    }

    .tag-badge {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      background: rgba(59, 130, 246, 0.1);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.3);
      white-space: nowrap;
    }

    .tag-badge.re-tag {
      background: rgba(16, 185, 129, 0.1);
      color: #6ee7b7;
      border-color: rgba(16, 185, 129, 0.3);
    }

    .tag-badge.empty-tag {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.3);
      font-style: italic;
    }

    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-completo { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .status-apenas-motor { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .status-apenas-redutor { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }

    .check-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .row-check {
      width: 18px;
      height: 18px;
      accent-color: #10b981;
      cursor: pointer;
    }

    #no-results {
      display: none;
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    @media (max-width: 900px) {
      header {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .header-right, .logo-area {
        justify-self: center;
      }
      .controls { flex-direction: column; }
      .filter-select { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div></div>
    <div class="logo-area">
      <h1>INPASA Parada SINOP</h1>
      <p>Dashboard de Consolidação Eletromecânica</p>
    </div>
    <div class="header-right">
      <img class="brand-logo" src="gold-redutores.png" alt="Gold Redutores">
    </div>
  </header>

  <div class="stats-container">
    <div class="stat-card"><div class="stat-title">Total de Registros</div><div class="stat-value" id="total-count">0</div></div>
    <div class="stat-card"><div class="stat-title">Consolidados</div><div class="stat-value" id="complete-count">0</div></div>
    <div class="stat-card"><div class="stat-title">Somente Motor</div><div class="stat-value" id="motor-count">0</div></div>
    <div class="stat-card"><div class="stat-title">Somente Redutor</div><div class="stat-value" id="redutor-count">0</div></div>
  </div>

  <main class="main-content">
    <div class="controls">
      <div class="search-bar">
        <input type="text" class="search-input" id="search-input" placeholder="Pesquisar por TAG, descrição ou fonte...">
      </div>

      <select class="filter-select" id="status-filter">
        <option value="all">Status: Todos</option>
        <option value="Completo">Status: Completo</option>
        <option value="Apenas Motor">Status: Apenas Motor</option>
        <option value="Apenas Redutor">Status: Apenas Redutor</option>
      </select>

      <select class="filter-select" id="source-filter">
        <option value="all">Fonte OCR: Todas</option>
      </select>
    </div>

    <div class="save-bar">
      <button class="load-btn" id="load-btn">Carregar do GitHub</button>
      <button class="save-btn" id="save-btn">Salvar no GitHub</button>
    </div>
    <div class="save-info" id="save-info"></div>

    <div class="table-container">
      <table id="data-table">
        <thead>
          <tr>
            <th>Status</th>
            <th>TAG Motor (ME)</th>
            <th>Descrição do Motor</th>
            <th>TAG Redutor (RE/VRL)</th>
            <th>Descrição do Redutor</th>
            <th>Potência</th>
            <th>Selecionar</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="no-results">Nenhum equipamento encontrado com os filtros atuais.</div>
    </div>
  </main>

  <script src="table-data.js"></script>
  <script>
    const tbody = document.getElementById('table-body');
    const searchInput = document.getElementById('search-input');
    const statusFilter = document.getElementById('status-filter');
    const sourceFilter = document.getElementById('source-filter');
    const noResults = document.getElementById('no-results');
    const table = document.getElementById('data-table');
    const totalEl = document.getElementById('total-count');
    const completeEl = document.getElementById('complete-count');
    const motorEl = document.getElementById('motor-count');
    const redutorEl = document.getElementById('redutor-count');
    const saveBtn = document.getElementById('save-btn');
    const loadBtn = document.getElementById('load-btn');
    const saveInfo = document.getElementById('save-info');

    const STORAGE_KEY = 'inpasa_sinop_checks_v2';
    let remoteSelections = {};

    function getRowKey(item) {
      return [item.tag_me || '-', item.tag_re || '-', item.desc || '-', item.desc_ocr || '-', item.source || '-'].join('|');
    }

    function getStatusClass(status) {
      if (status === 'Completo') return 'status-completo';
      if (status === 'Apenas Motor') return 'status-apenas-motor';
      if (status === 'Apenas Redutor') return 'status-apenas-redutor';
      return '';
    }

    function loadSelectionsLocal() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function persistSelectionsLocal(selections) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(selections));
    }

    function mergeSelections(source) {
      const current = loadSelectionsLocal();
      const merged = { ...current, ...source };
      persistSelectionsLocal(merged);
      return merged;
    }

    function popularFiltroDeFontes() {
      const fontes = [...new Set(tableData.map(item => item.source || '-'))].sort();
      fontes.forEach(fonte => {
        const option = document.createElement('option');
        option.value = fonte;
        option.textContent = fonte === '-' ? '- (Apenas PDF)' : fonte;
        sourceFilter.appendChild(option);
      });
    }

    function renderTable() {
      const searchTerm = searchInput.value.toLowerCase();
      const statusVal = statusFilter.value;
      const sourceVal = sourceFilter.value;
      const selections = loadSelectionsLocal();

      const filtered = tableData.filter(item => {
        const searchString = [
          item.tag_me || '-',
          item.tag_re || '-',
          item.desc || '-',
          item.desc_ocr || '-',
          item.source || '-'
        ].join(' ').toLowerCase();

        const matchesSearch = searchString.includes(searchTerm);
        const matchesStatus = statusVal === 'all' || item.status === statusVal;
        const matchesSource = sourceVal === 'all' || (item.source || '-') === sourceVal;

        return matchesSearch && matchesStatus && matchesSource;
      });

      tbody.innerHTML = '';

      if (filtered.length === 0) {
        noResults.style.display = 'block';
        table.style.display = 'none';
        return;
      }

      noResults.style.display = 'none';
      table.style.display = 'table';

      filtered.forEach(item => {
        const tr = document.createElement('tr');
        const rowKey = getRowKey(item);
        const checked = selections[rowKey] ? 'checked' : '';

        const tagMeHtml = item.tag_me === '-'
          ? '<span class="tag-badge empty-tag">N/A</span>'
          : `<span class="tag-badge">${item.tag_me}</span>`;

        const tagReHtml = item.tag_re === '-'
          ? '<span class="tag-badge empty-tag">N/A</span>'
          : `<span class="tag-badge re-tag">${item.tag_re}</span>`;

        const potHtml = (item.hp && item.hp !== '-')
          ? `${item.hp} HP<br><small>(${item.kw || '-'} KW)</small>`
          : '-';

        tr.innerHTML = `
          <td><span class="status-badge ${getStatusClass(item.status)}">${item.status}</span></td>
          <td>${tagMeHtml}</td>
          <td>${item.desc || '-'}</td>
          <td>${tagReHtml}</td>
          <td>${item.desc_ocr || '-'}</td>
          <td>${potHtml}</td>
          <td><div class="check-wrap"><input type="checkbox" class="row-check" data-row-key="${rowKey.replace(/"/g, '&quot;')}" ${checked}></div></td>
        `;

        tbody.appendChild(tr);
      });
    }

    function updateStats() {
      totalEl.innerText = tableData.length;
      completeEl.innerText = tableData.filter(item => item.status === 'Completo').length;
      motorEl.innerText = tableData.filter(item => item.status === 'Apenas Motor').length;
      redutorEl.innerText = tableData.filter(item => item.status === 'Apenas Redutor').length;
    }

    async function loadRemoteSelections() {
      saveInfo.textContent = 'Carregando marcações salvas...';
      try {
        const response = await fetch('/.netlify/functions/get-selection');
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Falha ao carregar.');
        }

        remoteSelections = data.selections || {};
        mergeSelections(remoteSelections);
        renderTable();
        const total = Object.values(remoteSelections).filter(Boolean).length;
        saveInfo.textContent = `Marcações carregadas do GitHub. ${total} item(ns) marcado(s).`;
      } catch (error) {
        saveInfo.textContent = `Erro ao carregar: ${error.message}`;
      }
    }

    async function saveRemoteSelections() {
      const selections = loadSelectionsLocal();
      const total = Object.values(selections).filter(Boolean).length;
      saveInfo.textContent = 'Salvando no GitHub...';

      try {
        const response = await fetch('/.netlify/functions/save-selection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ selections })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Falha ao salvar.');
        }

        saveInfo.textContent = `Salvo no GitHub com sucesso. ${total} item(ns) marcado(s). Commit: ${data.commitSha?.slice(0, 7) || 'ok'}`;
      } catch (error) {
        saveInfo.textContent = `Erro ao salvar: ${error.message}`;
      }
    }

    searchInput.addEventListener('input', renderTable);
    statusFilter.addEventListener('change', renderTable);
    sourceFilter.addEventListener('change', renderTable);

    document.addEventListener('change', (event) => {
      if (!event.target.classList.contains('row-check')) return;
      const selections = loadSelectionsLocal();
      const key = event.target.dataset.rowKey;
      selections[key] = event.target.checked;
      persistSelectionsLocal(selections);
    });

    saveBtn.addEventListener('click', saveRemoteSelections);
    loadBtn.addEventListener('click', loadRemoteSelections);

    popularFiltroDeFontes();
    updateStats();
    renderTable();
    loadRemoteSelections();
  </script>
</body>
</html>
